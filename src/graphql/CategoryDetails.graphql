query CategoryDetails($slug: String!, $channel: String!) {
	category(slug: $slug) {
		id
		name
		slug
		description
		seoDescription
		seoTitle
		level
		backgroundImage {
			url
			alt
		}
		parent {
			id
			name
			slug
		}
		children(first: 20) {
			edges {
				node {
					id
					name
					slug
					description
					backgroundImage {
						url
						alt
					}
				}
			}
		}
		ancestors(first: 10) {
			edges {
				node {
					id
					name
					slug
				}
			}
		}
		products(first: 100, channel: $channel) {
			totalCount
			edges {
				node {
					...ProductListItem
				}
			}
		}
	}
}
